[meta]
version = 1
purpose = "Canonical price-action ontology for BNR feature exploration."
default_inputs = ["ohlcv_1m"]

[groups.volatility]
label = "Volatility"
features = [
  "impulse_speed",
  "volatility_expansion_ratio",
  "compression_before_break",
  "candle_tempo_decay",
]

[groups.momentum]
label = "Momentum"
features = [
  "directional_efficiency",
  "followthrough_strength",
  "continuation_displacement_ratio",
  "failed_followthrough_probability",
]

[groups.candles]
label = "Candle Structure"
features = [
  "body_to_range_ratio",
  "upper_wick_fraction",
  "lower_wick_fraction",
  "consecutive_directional_bars",
  "alternating_bar_frequency",
]

[groups.structure]
label = "Structure"
features = [
  "swing_overlap_score",
  "pivot_cleanliness",
  "flem_compression",
  "repair_depth_fraction",
]

[groups.liquidity]
label = "Liquidity"
features = [
  "distance_to_recent_high",
  "distance_to_recent_low",
  "failed_breakout_reclaim",
]

[groups.auction]
label = "Session / Auction"
features = [
  "opening_drive_strength",
  "opening_balance_stability",
  "trend_day_probability",
  "session_transition_score",
]

[features.impulse_speed]
category = "volatility"
concept = "Fast directional movement"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["setup_quality", "market_state", "followthrough"]
risk = "low"
curve_fit_risk = "low"
support_requirement = "low"
description = "Distance traveled per bar normalized by recent volatility"

[features.volatility_expansion_ratio]
category = "volatility"
concept = "Breakout expansion"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["setup_quality", "breakout_quality"]
risk = "low"
curve_fit_risk = "low"
support_requirement = "low"
description = "Current bar range relative to recent rolling range"

[features.compression_before_break]
category = "volatility"
concept = "Pre-break compression"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["setup_quality", "breakout_quality"]
risk = "medium"
curve_fit_risk = "medium"
support_requirement = "medium"
description = "Measures narrowing range before directional expansion"

[features.candle_tempo_decay]
category = "volatility"
concept = "Momentum deterioration"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["failure_detection", "exit_behavior"]
risk = "low"
curve_fit_risk = "low"
support_requirement = "low"
description = "Decline in directional speed after reclaim"

[features.directional_efficiency]
category = "momentum"
concept = "Clean directional travel"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["market_state", "setup_quality"]
risk = "low"
curve_fit_risk = "low"
support_requirement = "low"
description = "Net directional distance divided by total traveled distance"

[features.followthrough_strength]
category = "momentum"
concept = "Immediate continuation after trigger"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["setup_quality", "exit_behavior"]
risk = "low"
curve_fit_risk = "low"
support_requirement = "low"
description = "Measures continuation over next N bars after reclaim"

[features.continuation_displacement_ratio]
category = "momentum"
concept = "Directional displacement"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["continuation"]
risk = "medium"
curve_fit_risk = "medium"
support_requirement = "medium"
description = "Directional displacement normalized by zone width"

[features.failed_followthrough_probability]
category = "momentum"
concept = "Breakout stall risk"
point_in_time = true
inputs = ["ohlcv_1m"]
families = ["failure_detection", "eligibility"]
risk = "medium"
curve_fit_risk = "medium"
support_requirement = "medium"
description = "Likelihood that breakout stalls within early bars"

[features.body_to_range_ratio]
category = "candles"
